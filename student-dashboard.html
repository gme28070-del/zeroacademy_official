<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroDayAcademy - Área do Aluno</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0b0c10;
            color: #66fcf1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background-color: #1f2833;
            border-bottom: 2px solid #45f3ff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            color: #45f3ff;
            font-size: 20px;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid #ff5555;
            color: #ff5555;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-logout:hover {
            background-color: #ff5555;
            color: #0b0c10;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        .welcome-box {
            background-color: #1f2833;
            border-left: 4px solid #95ed19;
            padding: 20px;
            margin-bottom: 30px;
        }

        .welcome-box h2 {
            color: #95ed19;
            font-size: 24px;
            margin-bottom: 5px;
        }

        /* --- Estilização da nova Barra de Pesquisa --- */
        .busca-container {
            margin-bottom: 30px;
            width: 100%;
        }

        .input-busca {
            width: 100%;
            background-color: #1f2833;
            border: 1px solid #45f3ff;
            color: #66fcf1;
            padding: 12px 20px;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
            box-shadow: 0 0 10px rgba(69,243,255,0.05);
        }

        .input-busca:focus {
            border-color: #95ed19;
            box-shadow: 0 0 15px rgba(149,237,25,0.2);
        }

        .input-busca::placeholder {
            color: #c5c6c7;
            opacity: 0.5;
        }
        /* --------------------------------------------- */

        .grid-modulos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card-modulo {
            background-color: #1f2833;
            border: 1px solid #45f3ff;
            padding: 20px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-modulo h3 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .tag-tipo {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            padding: 3px 8px;
            background-color: #0b0c10;
            color: #95ed19;
            border: 1px solid #95ed19;
            margin-bottom: 15px;
            align-self: flex-start;
        }

        .btn-acessar {
            display: block;
            width: 100%;
            background: transparent;
            border: 1px solid #45f3ff;
            color: #45f3ff;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .btn-acessar:hover {
            background-color: #45f3ff;
            color: #0b0c10;
        }

        /* Modal de texto */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.ativo {
            display: flex;
        }

        .modal-box {
            background-color: #1f2833;
            border: 1px solid #45f3ff;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(69,243,255,0.2);
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #45f3ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #95ed19;
            font-size: 14px;
            text-transform: uppercase;
        }

        .modal-fechar {
            background: transparent;
            border: 1px solid #ff5555;
            color: #ff5555;
            padding: 4px 10px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }

        .modal-fechar:hover {
            background-color: #ff5555;
            color: #0b0c10;
        }

        .modal-corpo {
            padding: 20px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.7;
            color: #c5c6c7;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>[ ACADEMY_PORTAL ]</h1>
        <button class="btn-logout" onclick="window.location.href='/'">Sair</button>
    </div>

    <div class="container">
        <div class="welcome-box">
            <h2>MÓDULOS DE TREINAMENTO DISPONÍVEIS</h2>
            <p>Selecione uma categoria abaixo para iniciar as lições.</p>
        </div>

        <div class="busca-container">
            <input type="text" id="inputBusca" class="input-busca" placeholder="[ PESQUISAR MÓDULO POR TÍTULO OU TAG... ]" oninput="filtrarModulos()">
        </div>

        <div class="grid-modulos" id="containerModulos">
            <p style="grid-column: 1/-1; text-align: center;">[ CARREGANDO TREINAMENTOS... ]</p>
        </div>
    </div>

    <div class="modal-overlay" id="modalTexto">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitulo">INSTRUÇÕES</h3>
                <button class="modal-fechar" onclick="fecharModal()">[ X ]</button>
            </div>
            <div class="modal-corpo" id="modalConteudo"></div>
        </div>
    </div>

    <script>
        // Variável global para cachear os módulos vindos da API
        let todosOsModulos = [];

        async function carregarModulos() {
            const container = document.getElementById('containerModulos');
            try {
                const resposta = await fetch('/api/aluno/listar-modulos');
                const resultado = await resposta.json();

                if (resposta.ok && resultado.status === 'sucesso') {
                    // Armazena os módulos na variável global para busca local instantânea
                    todosOsModulos = resultado.modulos || [];
                    
                    // Renderiza a lista inicial completa
                    renderizarModulos(todosOsModulos);
                } else {
                    container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#ff5555;">Erro ao renderizar módulos do banco.</p>`;
                }
            } catch (erro) {
                container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#ff5555;">Falha na conexão com a API.</p>`;
            }
        }

        // Função isolada responsável apenas por colocar os cards no HTML
        function renderizarModulos(listaDeModulos) {
            const container = document.getElementById('containerModulos');
            container.innerHTML = '';

            if (listaDeModulos.length === 0) {
                const termo = document.getElementById('inputBusca').value;
                if (termo) {
                    container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#ff5555;">Nenhum módulo encontrado para o termo pesquisado.</p>`;
                } else {
                    container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#ff5555;">Nenhum módulo foi publicado pelo administrador ainda.</p>`;
                }
                return;
            }

            listaDeModulos.forEach(modulo => {
                const card = document.createElement('div');
                card.className = 'card-modulo';

                const cabecalho = document.createElement('div');
                cabecalho.innerHTML = `
                    <span class="tag-tipo">${modulo.tipo_recurso.toUpperCase()}</span>
                    <h3>${modulo.titulo}</h3>
                `;
                card.appendChild(cabecalho);

                let conteudoLimpo = modulo.conteudo.trim();

                // Regex robusta para validar se o conteúdo se comporta como uma URL/Link externo (.com, .net, .org, etc.)
                const regexUrl = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/i;
                const ehLink = regexUrl.test(conteudoLimpo);

                if (ehLink) {
                    // Se o usuário esqueceu de digitar o http:// ou https://, nós adicionamos automaticamente
                    if (!conteudoLimpo.startsWith('http://') && !conteudoLimpo.startsWith('https://')) {
                        conteudoLimpo = 'https://' + conteudoLimpo;
                    }

                    const link = document.createElement('a');
                    link.href = conteudoLimpo;
                    link.target = '_blank'; // Força abrir em uma nova aba
                    link.rel = 'noopener noreferrer'; // Segurança contra vulnerabilidades de abas
                    link.className = 'btn-acessar';
                    link.textContent = 'Iniciar Conteúdo ↗';
                    card.appendChild(link);
                } else {
                    const btn = document.createElement('button');
                    btn.className = 'btn-acessar';
                    btn.textContent = 'Ler Instruções';
                    btn.addEventListener('click', () => {
                        abrirModal(modulo.titulo, conteudoLimpo);
                    });
                    card.appendChild(btn);
                }

                container.appendChild(card);
            });
        }

        // Nova função que roda em tempo real enquanto o aluno digita
        function filtrarModulos() {
            const termoBusca = document.getElementById('inputBusca').value.toLowerCase().trim();
            
            const modulosFiltrados = todosOsModulos.filter(modulo => {
                const tituloCombina = modulo.titulo.toLowerCase().includes(termoBusca);
                const tagCombina = modulo.tipo_recurso.toLowerCase().includes(termoBusca);
                return tituloCombina || tagCombina;
            });

            renderizarModulos(modulosFiltrados);
        }

        function abrirModal(titulo, conteudo) {
            document.getElementById('modalTitulo').textContent = `[ INSTRUÇÕES — ${titulo.toUpperCase()} ]`;
            document.getElementById('modalConteudo').textContent = conteudo;
            document.getElementById('modalTexto').classList.add('ativo');
        }

        function fecharModal() {
            document.getElementById('modalTexto').classList.remove('ativo');
        }

        document.getElementById('modalTexto').addEventListener('click', function(e) {
            if (e.target === this) fecharModal();
        });

        window.addEventListener('DOMContentLoaded', carregarModulos);
    </script>
</body>
</html>
