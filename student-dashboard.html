<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroDayAcademy - Área do Aluno</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #050508;
            color: #e0e0e6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Navbar VIP --- */
        .navbar {
            background-color: #0d0d14;
            border-bottom: 2px solid #ffb800;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(255, 184, 0, 0.08);
        }

        .navbar h1 {
            color: #ffb800;
            font-size: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 184, 0, 0.3);
        }

        .btn-logout {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 8px 18px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background-color: #ff4444;
            color: #050508;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.4);
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        /* --- Painel de Boas-Vindas Premium --- */
        .welcome-box {
            background: linear-gradient(135deg, #0d0d14 0%, #141421 100%);
            border-left: 4px solid #ffb800;
            border-right: 1px solid rgba(255, 184, 0, 0.1);
            border-top: 1px solid rgba(255, 184, 0, 0.1);
            border-bottom: 1px solid rgba(255, 184, 0, 0.1);
            padding: 25px;
            margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .welcome-box h2 {
            color: #ffb800;
            font-size: 24px;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255, 184, 0, 0.2);
        }

        .welcome-box p {
            color: #a0a0b0;
        }

        /* --- Barra de Pesquisa VIP --- */
        .busca-container {
            margin-bottom: 35px;
            width: 100%;
        }

        .input-busca {
            width: 100%;
            background-color: #0d0d14;
            border: 1px solid #333344;
            color: #ffb800;
            padding: 15px 22px;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }

        .input-busca:focus {
            border-color: #ffb800;
            box-shadow: 0 0 15px rgba(255, 184, 0, 0.15);
        }

        .input-busca::placeholder {
            color: #666677;
        }

        /* --- Cards dos Módulos Exclusivos --- */
        .grid-modulos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card-modulo {
            background: #0d0d14;
            border: 1px solid #222233;
            padding: 25px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .card-modulo:hover {
            transform: translateY(-4px);
            border-color: #ffb800;
            box-shadow: 0 12px 24px rgba(255, 184, 0, 0.08);
        }

        .card-modulo h3 {
            color: #ffffff;
            margin-bottom: 15px;
            font-size: 19px;
            letter-spacing: 0.5px;
        }

        /* Badge VIP de Categoria */
        .tag-tipo {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            padding: 4px 10px;
            background-color: #1a1a26;
            color: #ffb800;
            border: 1px solid rgba(255, 184, 0, 0.3);
            margin-bottom: 18px;
            align-self: flex-start;
            border-radius: 2px;
            letter-spacing: 1px;
        }

        /* Botões de Ação Atualizados */
        .btn-acessar {
            display: block;
            width: 100%;
            background: #141421;
            border: 1px solid #ffb800;
            color: #ffb800;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
            letter-spacing: 1px;
        }

        .btn-acessar:hover {
            background-color: #ffb800;
            color: #050508;
            box-shadow: 0 0 15px rgba(255, 184, 0, 0.3);
        }

        /* --- Modal de Texto VIP --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(3, 3, 5, 0.85);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-overlay.ativo {
            display: flex;
        }

        .modal-box {
            background-color: #0d0d14;
            border: 1px solid #ffb800;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            border-radius: 6px;
            box-shadow: 0 0 40px rgba(255, 184, 0, 0.15);
        }

        .modal-header {
            padding: 18px 24px;
            border-bottom: 1px solid #222233;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #ffb800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-fechar {
            background: transparent;
            border: 1px solid #aa3333;
            color: #ff4444;
            padding: 6px 12px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .modal-fechar:hover {
            background-color: #ff4444;
            color: #050508;
        }

        .modal-corpo {
            padding: 24px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.8;
            color: #ccccdd;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>[ ACADEMY_PORTAL ]</h1>
        <button class="btn-logout" onclick="window.location.href='/'">Sair</button>
    </div>

    <div class="container">
        <div class="welcome-box">
            <h2>MÓDULOS DE TREINAMENTO DISPONÍVEIS</h2>
            <p>Selecione uma categoria abaixo para iniciar as lições.</p>
        </div>

        <div class="busca-container">
            <input type="text" id="inputBusca" class="input-busca" placeholder="[ PESQUISAR MÓDULO POR TÍTULO OU TAG... ]" oninput="filtrarModulos()">
        </div>

        <div class="grid-modulos" id="containerModulos">
            <p style="grid-column: 1/-1; text-align: center;">[ CARREGANDO TREINAMENTOS... ]</p>
        </div>
    </div>

    <div class="modal-overlay" id="modalTexto">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitulo">INSTRUÇÕES</h3>
                <button class="modal-fechar" onclick="fecharModal()">[ X ]</button>
            </div>
            <div class="modal-corpo" id="modalConteudo"></div>
        </div>
    </div>

    <script>
        // Variável global para cachear os módulos vindos da API
        let todosOsModulos = [];

        async function carregarModulos() {
            const container = document.getElementById('containerModulos');
            try {
                const resposta = await fetch('/api/aluno/listar-modulos');
                const resultado = await resposta.json();

                if (resposta.ok && resultado.status === 'sucesso') {
                    // Armazena os módulos na variável global para busca local instantânea
                    todosOsModulos = resultado.modulos || [];
                    
                    // Renderiza a lista inicial completa
                    renderizarModulos(todosOsModulos);
                } else {
                    container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#ff5555;">Erro ao renderizar módulos do banco.</p>`;
                }
            } catch (erro) {
                container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#ff5555;">Falha na conexão com a API.</p>`;
            }
        }

        // Função isolada responsável apenas por colocar os cards no HTML
        function renderizarModulos(listaDeModulos) {
            const container = document.getElementById('containerModulos');
            container.innerHTML = '';

            if (listaDeModulos.length === 0) {
                const termo = document.getElementById('inputBusca').value;
                if (termo) {
                    container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#ff5555;">Nenhum módulo encontrado para o termo pesquisado.</p>`;
                } else {
                    container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#ff5555;">Nenhum módulo foi publicado pelo administrador ainda.</p>`;
                }
                return;
            }

            listaDeModulos.forEach(modulo => {
                const card = document.createElement('div');
                card.className = 'card-modulo';

                const cabecalho = document.createElement('div');
                cabecalho.innerHTML = `
                    <span class="tag-tipo">${modulo.tipo_recurso.toUpperCase()}</span>
                    <h3>${modulo.titulo}</h3>
                `;
                card.appendChild(cabecalho);

                let conteudoLimpo = modulo.conteudo.trim();

                // Regex robusta para validar se o conteúdo se comporta como uma URL/Link externo (.com, .net, .org, etc.)
                const regexUrl = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/i;
                const ehLink = regexUrl.test(conteudoLimpo);

                if (ehLink) {
                    // Se o usuário esqueceu de digitar o http:// ou https://, nós adicionamos automaticamente
                    if (!conteudoLimpo.startsWith('http://') && !conteudoLimpo.startsWith('https://')) {
                        conteudoLimpo = 'https://' + conteudoLimpo;
                    }

                    const link = document.createElement('a');
                    link.href = conteudoLimpo;
                    link.target = '_blank'; // Força abrir em uma nova aba
                    link.rel = 'noopener noreferrer'; // Segurança contra vulnerabilidades de abas
                    link.className = 'btn-acessar';
                    link.textContent = 'Iniciar Conteúdo ↗';
                    card.appendChild(link);
                } else {
                    const btn = document.createElement('button');
                    btn.className = 'btn-acessar';
                    btn.textContent = 'Ler Instruções';
                    btn.addEventListener('click', () => {
                        abrirModal(modulo.titulo, conteudoLimpo);
                    });
                    card.appendChild(btn);
                }

                container.appendChild(card);
            });
        }

        // Nova função que roda em tempo real enquanto o aluno digita
        function filtrarModulos() {
            const termoBusca = document.getElementById('inputBusca').value.toLowerCase().trim();
            
            const modulosFiltrados = todosOsModulos.filter(modulo => {
                const tituloCombina = modulo.titulo.toLowerCase().includes(termoBusca);
                const tagCombina = modulo.tipo_recurso.toLowerCase().includes(termoBusca);
                return tituloCombina || tagCombina;
            });

            renderizarModulos(modulosFiltrados);
        }

        function abrirModal(titulo, conteudo) {
            document.getElementById('modalTitulo').textContent = `[ INSTRUÇÕES — ${titulo.toUpperCase()} ]`;
            document.getElementById('modalConteudo').textContent = conteudo;
            document.getElementById('modalTexto').classList.add('ativo');
        }

        function fecharModal() {
            document.getElementById('modalTexto').classList.remove('ativo');
        }

        document.getElementById('modalTexto').addEventListener('click', function(e) {
            if (e.target === this) fecharModal();
        });

        window.addEventListener('DOMContentLoaded', carregarModulos);
    </script>
</body>
</html>
