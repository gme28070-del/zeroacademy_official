<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #0b0c10; color: #66fcf1; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .login-container { background-color: #1f2833; border: 2px solid #95ed19; padding: 40px; border-radius: 4px; box-shadow: 0 0 20px rgba(149, 237, 25, 0.2); width: 100%; max-width: 400px; }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { color: #95ed19; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; }
        .login-header p { color: #c5c6c7; font-size: 12px; margin-top: 5px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; color: #95ed19; font-size: 12px; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; background-color: #0b0c10; border: 1px solid #45f3ff; color: #fff; font-size: 14px; border-radius: 4px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #95ed19; box-shadow: 0 0 10px rgba(149, 237, 25, 0.5); }
        .btn-login { width: 100%; padding: 12px; background-color: transparent; border: 2px solid #95ed19; color: #95ed19; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background-color: #95ed19; color: #0b0c10; box-shadow: 0 0 15px rgba(149, 237, 25, 0.6); }
        .footer-text { text-align: center; margin-top: 20px; font-size: 11px; color: #66fcf1; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>[ CONECTAR ]</h1>
            <p>Insira suas credenciais para acessar o sistema.</p>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" required autocomplete="off" placeholder="root">
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="********">
            </div>
            <button type="submit" class="btn-login">Autenticar</button>
        </form>
        <div class="footer-text">
            <p>Acesso restrito. IP monitorado.</p>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Impede a página de recarregar

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const btn = document.querySelector('.btn-login');

            // Feedback visual de carregamento estilo terminal
            btn.innerText = "[ AUTENTICANDO... ]";
            btn.disabled = true;

            try {
                const resposta = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                const resultado = await resposta.json();

                if (resposta.ok && resultado.status === 'sucesso') {
                    alert(resultado.mensagem);
                    window.location.href = resultado.redirecionar; // Ativa o redirecionamento real
                } else {
                    alert("ERRO DE AUTENTICAÇÃO: " + (resultado.mensagem || "Credenciais incorretas."));
                }
            } catch (erro) {
                console.error(erro);
                alert("Falha ao conectar ao servidor de autenticação.");
            } finally {
                // Restaura o botão
                btn.innerText = "Autenticar";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
