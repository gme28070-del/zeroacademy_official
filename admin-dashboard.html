<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroDayAcademy - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0b0c10;
            color: #66fcf1;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: #1f2833;
            border-right: 2px solid #95ed19;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar h2 {
            color: #95ed19;
            font-size: 18px;
            text-align: center;
            border-bottom: 1px dashed #95ed19;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #45f3ff;
            color: #45f3ff;
            padding: 12px;
            text-align: left;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: #95ed19;
            color: #0b0c10;
            border-color: #95ed19;
            box-shadow: 0 0 10px rgba(149, 237, 25, 0.4);
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 2px solid #1f2833;
            padding-bottom: 15px;
        }

        .header h1 {
            color: #95ed19;
            font-size: 28px;
        }

        .dashboard-section {
            display: none;
            background-color: #1f2833;
            border: 1px solid #1f2833;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .dashboard-section.active {
            display: block;
            border-color: #45f3ff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #95ed19;
            margin-bottom: 5px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background-color: #0b0c10;
            border: 1px solid #45f3ff;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #95ed19;
            box-shadow: 0 0 8px rgba(149, 237, 25, 0.3);
        }

        .btn-submit {
            background: transparent;
            border: 2px solid #95ed19;
            color: #95ed19;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: #95ed19;
            color: #0b0c10;
            box-shadow: 0 0 15px rgba(149, 237, 25, 0.5);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .data-table th, .data-table td {
            border: 1px solid #45f3ff;
            padding: 12px;
            text-align: left;
        }

        .data-table th {
            background-color: #0b0c10;
            color: #95ed19;
            text-transform: uppercase;
        }

        .btn-deletar {
            background: transparent;
            border: 1px solid #ff5555;
            color: #ff5555;
            padding: 4px 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            transition: 0.3s;
        }

        .btn-deletar:hover {
            background-color: #ff5555;
            color: #0b0c10;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>[ C2_PANEL ]</h2>
        <button class="nav-btn active" onclick="switchTab('alunos', this)">Alunos</button>
        <button class="nav-btn" onclick="switchTab('modulos', this)">Módulos</button>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>SISTEMA DE GERENCIAMENTO INTERNO</h1>
            <p>Sessão ativa: root@zerodayacademy</p>
        </div>

        <!-- Seção Alunos -->
        <div id="alunos" class="dashboard-section active">
            <h2>[+] Cadastrar Novo Aluno</h2>
            <br>
            <!-- action="javascript:void(0)" e type="button" no submit evitam qualquer navegação acidental -->
            <form id="formAluno" action="javascript:void(0)">
                <div class="form-group">
                    <label>Nome do Aluno</label>
                    <input type="text" id="nomeAluno" required placeholder="Ex: John Doe">
                </div>
                <div class="form-group">
                    <label>Usuário de Acesso</label>
                    <input type="text" id="userAluno" required placeholder="Ex: john_cyber">
                </div>
                <div class="form-group">
                    <label>Senha Inicial</label>
                    <input type="password" id="senhaAluno" required placeholder="********">
                </div>
                <button type="button" class="btn-submit" id="btnCadastrarAluno">Registrar Aluno</button>
            </form>

            <br><br>
            <h2>[+] Alunos Cadastrados</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Nome</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaAlunos">
                    <tr>
                        <td colspan="3" style="text-align:center;">[ CARREGANDO DADOS... ]</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Seção Módulos -->
        <div id="modulos" class="dashboard-section">
            <h2>[+] Criar Novo Módulo Teórico/Prático</h2>
            <br>
            <form id="formModulo" action="javascript:void(0)">
                <div class="form-group">
                    <label>Título do Módulo</label>
                    <input type="text" id="tituloModulo" required placeholder="Ex: Introdução ao Linux">
                </div>
                <div class="form-group">
                    <label>Tipo de Recurso Principal</label>
                    <select id="tipoRecurso">
                        <option value="video">Vídeo (YouTube)</option>
                        <option value="pdf">Documento PDF</option>
                        <option value="texto">Texto / Instruções</option>
                        <option value="interativo">Ambiente Interativo (HTML/JS)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Link ou Conteúdo do Recurso</label>
                    <textarea id="conteudoModulo" rows="4" placeholder="URL do vídeo, link do arquivo ou texto descritivo..."></textarea>
                </div>
                <button type="button" class="btn-submit" id="btnCriarModulo">Implantar Módulo</button>
            </form>

            <br><br>
            <h2>[+] Módulos Publicados</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Tipo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaModulos">
                    <tr>
                        <td colspan="3" style="text-align:center;">[ CARREGANDO DADOS... ]</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ── Navegação entre abas ──────────────────────────────────────────────
        function switchTab(tabId, btnClicado) {
            document.querySelectorAll('.dashboard-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            btnClicado.classList.add('active');

            if (tabId === 'alunos') carregarAlunos();
            else if (tabId === 'modulos') carregarModulos();
        }

        // ── Alunos ───────────────────────────────────────────────────────────
        async function carregarAlunos() {
            const tbody = document.getElementById('listaAlunos');
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">[ CARREGANDO... ]</td></tr>';
            try {
                const res = await fetch('/api/admin/listar-alunos');
                const data = await res.json();

                tbody.innerHTML = '';
                if (!data.alunos || data.alunos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Nenhum aluno cadastrado.</td></tr>';
                    return;
                }

                data.alunos.forEach(aluno => {
                    const tr = document.createElement('tr');

                    const tdUser = document.createElement('td');
                    tdUser.textContent = aluno.usuario;

                    const tdNome = document.createElement('td');
                    tdNome.textContent = aluno.nome;

                    const tdAcao = document.createElement('td');
                    const btn = document.createElement('button');
                    btn.className = 'btn-deletar';
                    btn.textContent = '[ DELETAR ]';
                    btn.type = 'button';
                    btn.addEventListener('click', () => deletarAluno(aluno.usuario));
                    tdAcao.appendChild(btn);

                    tr.append(tdUser, tdNome, tdAcao);
                    tbody.appendChild(tr);
                });
            } catch {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#ff5555;">Falha na conexão.</td></tr>';
            }
        }

        async function deletarAluno(usuario) {
            if (!confirm(`Remover permanentemente o usuário "${usuario}"?`)) return;
            try {
                const res = await fetch('/api/admin/deletar-aluno', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario })
                });
                const data = await res.json();
                alert(data.mensagem);
                if (res.ok && data.status === 'sucesso') carregarAlunos();
            } catch {
                alert('Falha ao conectar com o servidor.');
            }
        }

        document.getElementById('btnCadastrarAluno').addEventListener('click', async () => {
            const nome    = document.getElementById('nomeAluno').value.trim();
            const usuario = document.getElementById('userAluno').value.trim();
            const senha   = document.getElementById('senhaAluno').value;
            if (!nome || !usuario || !senha) { alert('Preencha todos os campos.'); return; }

            const btn = document.getElementById('btnCadastrarAluno');
            btn.textContent = '[ SALVANDO... ]';
            btn.disabled = true;

            try {
                const res = await fetch('/api/admin/cadastrar-aluno', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, usuario, senha })
                });
                const data = await res.json();
                alert(data.mensagem);
                if (res.ok && data.status === 'sucesso') {
                    document.getElementById('formAluno').reset();
                    carregarAlunos();
                }
            } catch {
                alert('Falha ao conectar com o servidor.');
            } finally {
                btn.textContent = 'Registrar Aluno';
                btn.disabled = false;
            }
        });

        // ── Módulos ──────────────────────────────────────────────────────────
        async function carregarModulos() {
            const tbody = document.getElementById('listaModulos');
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">[ CARREGANDO... ]</td></tr>';
            try {
                const res = await fetch('/api/aluno/listar-modulos');
                const data = await res.json();

                tbody.innerHTML = '';
                if (!data.modulos || data.modulos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Nenhum módulo implantado.</td></tr>';
                    return;
                }

                data.modulos.forEach(modulo => {
                    const tr = document.createElement('tr');

                    const tdTitulo = document.createElement('td');
                    tdTitulo.textContent = modulo.titulo;

                    const tdTipo = document.createElement('td');
                    const tag = document.createElement('span');
                    tag.style.color = '#95ed19';
                    tag.textContent = modulo.tipo_recurso.toUpperCase();
                    tdTipo.appendChild(tag);

                    const tdAcao = document.createElement('td');
                    const btn = document.createElement('button');
                    btn.className = 'btn-deletar';
                    btn.textContent = '[ DELETAR ]';
                    btn.type = 'button';
                    btn.addEventListener('click', () => deletarModulo(modulo.id, modulo.titulo));
                    tdAcao.appendChild(btn);

                    tr.append(tdTitulo, tdTipo, tdAcao);
                    tbody.appendChild(tr);
                });
            } catch {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#ff5555;">Falha na conexão.</td></tr>';
            }
        }

        async function deletarModulo(id, titulo) {
            if (!confirm(`Remover permanentemente o módulo "${titulo}"?`)) return;
            try {
                const res = await fetch('/api/admin/deletar-modulo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                alert(data.mensagem);
                if (res.ok && data.status === 'sucesso') carregarModulos();
            } catch {
                alert('Falha ao conectar com o servidor.');
            }
        }

        document.getElementById('btnCriarModulo').addEventListener('click', async () => {
            const titulo       = document.getElementById('tituloModulo').value.trim();
            const tipo_recurso = document.getElementById('tipoRecurso').value;
            const conteudo     = document.getElementById('conteudoModulo').value.trim();
            if (!titulo || !conteudo) { alert('Título e conteúdo são obrigatórios.'); return; }

            const btn = document.getElementById('btnCriarModulo');
            btn.textContent = '[ IMPLANTANDO... ]';
            btn.disabled = true;

            try {
                const res = await fetch('/api/admin/criar-modulo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo, tipo_recurso, conteudo })
                });
                const data = await res.json();
                alert(data.mensagem);
                if (res.ok && data.status === 'sucesso') {
                    document.getElementById('formModulo').reset();
                    carregarModulos();
                }
            } catch {
                alert('Falha ao conectar com o servidor.');
            } finally {
                btn.textContent = 'Implantar Módulo';
                btn.disabled = false;
            }
        });

        // Carga inicial
        window.addEventListener('DOMContentLoaded', carregarAlunos);
    </script>
</body>
</html>
