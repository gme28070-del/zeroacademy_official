<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroDayAcademy - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0b0c10;
            color: #66fcf1;
            display: flex;
            min-height: 100vh;
        }

        /* Barra Lateral (Sidebar) */
        .sidebar {
            width: 250px;
            background-color: #1f2833;
            border-right: 2px solid #95ed19;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar h2 {
            color: #95ed19;
            font-size: 18px;
            text-align: center;
            border-bottom: 1px dashed #95ed19;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #45f3ff;
            color: #45f3ff;
            padding: 12px;
            text-align: left;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: #95ed19;
            color: #0b0c10;
            border-color: #95ed19;
            box-shadow: 0 0 10px rgba(149, 237, 25, 0.4);
        }

        /* Área de Conteúdo Principal */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 2px solid #1f2833;
            padding-bottom: 15px;
        }

        .header h1 {
            color: #95ed19;
            font-size: 28px;
        }

        /* Seções/Abas */
        .dashboard-section {
            display: none;
            background-color: #1f2833;
            border: 1px solid #1f2833;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .dashboard-section.active {
            display: block;
            border-color: #45f3ff;
        }

        /* Formulários do Painel */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #95ed19;
            margin-bottom: 5px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background-color: #0b0c10;
            border: 1px solid #45f3ff;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #95ed19;
            box-shadow: 0 0 8px rgba(149, 237, 25, 0.3);
        }

        .btn-submit {
            background: transparent;
            border: 2px solid #95ed19;
            color: #95ed19;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: #95ed19;
            color: #0b0c10;
            box-shadow: 0 0 15px rgba(149, 237, 25, 0.5);
        }

        /* Listas/Tabelas Estilizadas */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .data-table th, .data-table td {
            border: 1px solid #45f3ff;
            padding: 12px;
            text-align: left;
        }

        .data-table th {
            background-color: #0b0c10;
            color: #95ed19;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>[ C2_PANEL ]</h2>
        <button class="nav-btn active" onclick="switchTab('alunos')">Alunos</button>
        <button class="nav-btn" onclick="switchTab('modulos')">Módulos</button>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>SISTEMA DE GERENCIAMENTO INTERNO</h1>
            <p>Sessão ativa: root@zerodayacademy</p>
        </div>

        <div id="alunos" class="dashboard-section active">
            <h2>[+] Cadastrar Novo Aluno</h2>
            <br>
            <form id="formAluno">
                <div class="form-group">
                    <label>Nome do Aluno</label>
                    <input type="text" id="nomeAluno" required placeholder="Ex: John Doe">
                </div>
                <div class="form-group">
                    <label>Usuário de Acesso</label>
                    <input type="text" id="userAluno" required placeholder="Ex: john_cyber">
                </div>
                <div class="form-group">
                    <label>Senha Inicial</label>
                    <input type="password" id="senhaAluno" required placeholder="********">
                </div>
                <button type="submit" class="btn-submit">Registrar Aluno</button>
            </form>

            <br><br>
            <h2>[+] Alunos Cadastrados</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Nome</th>
                        <th>Módulos Ativos</th>
                    </tr>
                </thead>
                <tbody id="listaAlunos">
                    <tr>
                        <td>teste_aluno</td>
                        <td>Aluno Exemplo</td>
                        <td>Nenhum</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="modulos" class="dashboard-section">
            <h2>[+] Criar Novo Módulo Teórico/Prático</h2>
            <br>
            <form id="formModulo">
                <div class="form-group">
                    <label>Título do Módulo</label>
                    <input type="text" id="tituloModulo" required placeholder="Ex: Introdução ao Linux">
                </div>
                <div class="form-group">
                    <label>Tipo de Recurso Principal</label>
                    <select id="tipoRecurso">
                        <option value="video">Vídeo (YouTube)</option>
                        <option value="pdf">Documento PDF</option>
                        <option value="interativo">Ambiente Interativo (HTML/JS)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Link ou Conteúdo do Recurso</label>
                    <textarea id="conteudoModulo" rows="4" placeholder="URL do vídeo, link do arquivo ou código base..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Implantar Módulo</button>
            </form>
        </div>
    </div>

    <script>
        // Lógica simples para alternar entre abas
        function switchTab(tabId) {
            document.querySelectorAll('.dashboard-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
