<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroDayAcademy - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0b0c10;
            color: #66fcf1;
            display: flex;
            min-height: 100vh;
        }

        /* Barra Lateral (Sidebar) */
        .sidebar {
            width: 250px;
            background-color: #1f2833;
            border-right: 2px solid #95ed19;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar h2 {
            color: #95ed19;
            font-size: 18px;
            text-align: center;
            border-bottom: 1px dashed #95ed19;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #45f3ff;
            color: #45f3ff;
            padding: 12px;
            text-align: left;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: #95ed19;
            color: #0b0c10;
            border-color: #95ed19;
            box-shadow: 0 0 10px rgba(149, 237, 25, 0.4);
        }

        /* Área de Conteúdo Principal */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 2px solid #1f2833;
            padding-bottom: 15px;
        }

        .header h1 {
            color: #95ed19;
            font-size: 28px;
        }

        /* Seções/Abas */
        .dashboard-section {
            display: none;
            background-color: #1f2833;
            border: 1px solid #1f2833;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .dashboard-section.active {
            display: block;
            border-color: #45f3ff;
        }

        /* Formulários do Painel */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #95ed19;
            margin-bottom: 5px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background-color: #0b0c10;
            border: 1px solid #45f3ff;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #95ed19;
            box-shadow: 0 0 8px rgba(149, 237, 25, 0.3);
        }

        .btn-submit {
            background: transparent;
            border: 2px solid #95ed19;
            color: #95ed19;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: #95ed19;
            color: #0b0c10;
            box-shadow: 0 0 15px rgba(149, 237, 25, 0.5);
        }

        /* Listas/Tabelas Estilizadas */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .data-table th, .data-table td {
            border: 1px solid #45f3ff;
            padding: 12px;
            text-align: left;
        }

        .data-table th {
            background-color: #0b0c10;
            color: #95ed19;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>[ C2_PANEL ]</h2>
        <button class="nav-btn active" onclick="switchTab('alunos')">Alunos</button>
        <button class="nav-btn" onclick="switchTab('modulos')">Módulos</button>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>SISTEMA DE GERENCIAMENTO INTERNO</h1>
            <p>Sessão ativa: root@zerodayacademy</p>
        </div>

        <div id="alunos" class="dashboard-section active">
            <h2>[+] Cadastrar Novo Aluno</h2>
            <br>
            <form id="formAluno">
                <div class="form-group">
                    <label>Nome do Aluno</label>
                    <input type="text" id="nomeAluno" required placeholder="Ex: John Doe">
                </div>
                <div class="form-group">
                    <label>Usuário de Acesso</label>
                    <input type="text" id="userAluno" required placeholder="Ex: john_cyber">
                </div>
                <div class="form-group">
                    <label>Senha Inicial</label>
                    <input type="password" id="senhaAluno" required placeholder="********">
                </div>
                <button type="submit" class="btn-submit">Registrar Aluno</button>
            </form>

            <br><br>
            <h2>[+] Alunos Cadastrados</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Nome</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaAlunos">
                    <tr>
                        <td colspan="3" style="text-align:center;">[ CARREGANDO DADOS... ]</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="modulos" class="dashboard-section">
            <h2>[+] Criar Novo Módulo Teórico/Prático</h2>
            <br>
            <form id="formModulo">
                <div class="form-group">
                    <label>Título do Módulo</label>
                    <input type="text" id="tituloModulo" required placeholder="Ex: Introdução ao Linux">
                </div>
                <div class="form-group">
                    <label>Tipo de Recurso Principal</label>
                    <select id="tipoRecurso">
                        <option value="video">Vídeo (YouTube)</option>
                        <option value="pdf">Documento PDF</option>
                        <option value="interativo">Ambiente Interativo (HTML/JS)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Link ou Conteúdo do Recurso</label>
                    <textarea id="conteudoModulo" rows="4" placeholder="URL do vídeo, link do arquivo ou código base..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Implantar Módulo</button>
            </form>

            <br><br>
            <h2>[+] Módulos Publicados</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Tipo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaModulos">
                    <tr>
                        <td colspan="3" style="text-align:center;">[ CARREGANDO DADOS... ]</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Lógica para alternar entre as abas do painel
        function switchTab(tabId) {
            document.querySelectorAll('.dashboard-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');

            // Atualiza dinamicamente os dados dependendo da aba selecionada
            if (tabId === 'alunos') {
                carregarAlunos();
            } else if (tabId === 'modulos') {
                carregarModulos();
            }
        }

        // Função para carregar a lista de alunos vinda do Banco de Dados
        async function carregarAlunos() {
            const tabelaCorpo = document.getElementById('listaAlunos');
            try {
                const resposta = await fetch('/api/admin/listar-alunos');
                const resultado = await resposta.json();

                if (resposta.ok && resultado.status === 'sucesso') {
                    tabelaCorpo.innerHTML = ''; 

                    if (!resultado.alunos || resultado.alunos.length === 0) {
                        tabelaCorpo.innerHTML = `<tr><td colspan="3" style="text-align:center;">Nenhum aluno cadastrado.</td></tr>`;
                        return;
                    }

                    resultado.alunos.forEach(aluno => {
                        const linha = document.createElement('tr');
                        linha.innerHTML = `
                            <td>${aluno.usuario}</td>
                            <td>${aluno.nome}</td>
                            <td>
                                <button onclick="deletarAluno('${aluno.usuario}')" style="background:transparent; border:1px solid #ff5555; color:#ff5555; padding:4px 8px; cursor:pointer; font-weight:bold; font-family:monospace;">[ DELETAR ]</button>
                            </td>
                        `;
                        tabelaCorpo.appendChild(linha);
                    });
                } else {
                    tabelaCorpo.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#ff5555;">Erro ao carregar dados.</td></tr>`;
                }
            } catch (erro) {
                tabelaCorpo.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#ff5555;">Falha na conexão com o banco.</td></tr>`;
            }
        }

        // Função para deletar um aluno do sistema
        async function deletarAluno(usuario) {
            if (!confirm(`Tem certeza que deseja remover permanentemente o usuário ${usuario}?`)) {
                return;
            }

            try {
                const resposta = await fetch('/api/admin/deletar-aluno', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario })
                });
                const resultado = await resposta.json();

                if (resposta.ok && resultado.status === 'sucesso') {
                    alert(resultado.mensagem);
                    carregarAlunos(); 
                } else {
                    alert("ERRO: " + resultado.mensagem);
                }
            } catch (erro) {
                alert("Falha ao conectar com o servidor.");
            }
        }

        // Função para carregar a lista de módulos vinda do Banco de Dados
        async function carregarModulos() {
            const tabelaCorpo = document.getElementById('listaModulos');
            try {
                const resposta = await fetch('/api/aluno/listar-modulos');
                const resultado = await resposta.json();

                if (resposta.ok && resultado.status === 'sucesso') {
                    tabelaCorpo.innerHTML = ''; 

                    if (!resultado.modulos || resultado.modulos.length === 0) {
                        tabelaCorpo.innerHTML = `<tr><td colspan="3" style="text-align:center;">Nenhum módulo implantado.</td></tr>`;
                        return;
                    }

                    resultado.modulos.forEach(modulo => {
                        const linha = document.createElement('tr');
                        linha.innerHTML = `
                            <td>${modulo.titulo}</td>
                            <td><span style="color:#95ed19;">${modulo.tipo_recurso.toUpperCase()}</span></td>
                            <td>
                                <button onclick="deletarModulo(${modulo.id}, '${modulo.titulo}')" style="background:transparent; border:1px solid #ff5555; color:#ff5555; padding:4px 8px; cursor:pointer; font-weight:bold; font-family:monospace;">[ DELETAR ]</button>
                            </td>
                        `;
                        tabelaCorpo.appendChild(linha);
                    });
                } else {
                    tabelaCorpo.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#ff5555;">Erro ao carregar dados.</td></tr>`;
                }
            } catch (erro) {
                tabelaCorpo.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#ff5555;">Falha na conexão com o banco.</td></tr>`;
            }
        }

        // Função para deletar um módulo do sistema
        async function deletarModulo(id, titulo) {
            if (!confirm(`Tem certeza que deseja remover permanentemente o módulo "${titulo}"?`)) {
                return;
            }

            try {
                const resposta = await fetch('/api/admin/deletar-modulo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const resultado = await resposta.json();

                if (resposta.ok && resultado.status === 'sucesso') {
                    alert(resultado.mensagem);
                    carregarModulos(); 
                } else {
                    alert("ERRO: " + resultado.mensagem);
                }
            } catch (erro) {
                alert("Falha ao conectar com o servidor.");
            }
        }

        // FORMULÁRIO: Cadastrar Aluno
        document.getElementById('formAluno').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nomeAluno').value;
            const usuario = document.getElementById('userAluno').value;
            const senha = document.getElementById('senhaAluno').value;
            const btn = e.target.querySelector('.btn-submit');

            btn.innerText = "[ SALVANDO... ]";
            btn.disabled = true;

            try {
                const resposta = await fetch('/api/admin/cadastrar-aluno', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, usuario, senha })
                });
                const resultado = await resposta.json();

                if (resposta.ok && resultado.status === 'sucesso') {
                    alert(resultado.mensagem);
                    document.getElementById('formAluno').reset();
                    carregarAlunos(); 
                } else {
                    alert("ERRO: " + resultado.mensagem);
                }
            } catch (erro) {
                alert("Falha ao conectar com o servidor.");
            } finally {
                btn.innerText = "Registrar Aluno";
                btn.disabled = false;
            }
        });

        // FORMULÁRIO: Criar Módulo
        document.getElementById('formModulo').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const titulo = document.getElementById('tituloModulo').value;
            const tipo_recurso = document.getElementById('tipoRecurso').value;
            const conteudo = document.getElementById('conteudoModulo').value;
            const btn = e.target.querySelector('.btn-submit');

            btn.innerText = "[ IMPLANTANDO... ]";
            btn.disabled = true;

            try {
                const resposta = await fetch('/api/admin/criar-modulo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo, tipo_recurso, conteudo })
                });
                const resultado = await resposta.json();

                if (resposta.ok && resultado.status === 'sucesso') {
                    alert(resultado.mensagem);
                    document.getElementById('formModulo').reset();
                    carregarModulos(); 
                } else {
                    alert("ERRO: " + resultado.mensagem);
                }
            } catch (erro) {
                alert("Falha ao conectar com o servidor.");
            } finally {
                btn.innerText = "Implantar Módulo";
                btn.disabled = false;
            }
        });

        // Inicia a tabela assim que o painel abre
        window.addEventListener('DOMContentLoaded', carregarAlunos);
    </script>
</body>
</html>
